<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Merge Puzzle - Version Avancée</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      text-align: center;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
    }
    h1 { margin-bottom: 10px; }
    #top-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin-bottom: 20px;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(4, 70px);
      grid-gap: 8px;
      justify-content: center;
    }
    .cell {
      width: 70px;
      height: 70px;
      background-color: lightgray;
      border-radius: 10px;
      transition: background-color 0.3s, transform 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
      color: white;
      font-size: 18px;
    }
    .selected {
      outline: 3px solid black;
      transform: scale(1.1);
    }
    #controls {
      margin: 15px;
    }
    #controls button {
      padding: 8px 16px;
      margin: 0 5px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      border: none;
      background: #4CAF50;
      color: white;
    }
    #controls button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

<h1>Color Merge Puzzle</h1>

<div id="top-bar">
  <div id="level"></div>
  <div id="timer"></div>
  <div id="score"></div>
  <div id="target"></div>
</div>

<div id="controls">
  <button onclick="startGame(false)">Mode Chronométré</button>
  <button onclick="startGame(true)">Mode Infini</button>
</div>

<div id="grid"></div>

<audio id="mergeSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-click-1114.mp3"></audio>

<script>
const baseColors = ["red", "blue", "yellow"];
const advancedColors = ["green", "orange", "purple"];
const mixRules = {
  "red+blue": "purple",
  "blue+red": "purple",
  "red+yellow": "orange",
  "yellow+red": "orange",
  "blue+yellow": "green",
  "yellow+blue": "green",
};

let level = 1;
let timeLeft = 60;
let score = 0;
let timerInterval;
let selected = null;
let targetColor;
let infiniteMode = false;

const grid = document.getElementById('grid');
const timerDiv = document.getElementById('timer');
const levelDiv = document.getElementById('level');
const scoreDiv = document.getElementById('score');
const targetDiv = document.getElementById('target');
const mergeSound = document.getElementById('mergeSound');

function startGame(isInfinite) {
  infiniteMode = isInfinite;
  level = 1;
  score = 0;
  timeLeft = 60;
  updateTopBar();
  createGrid();
  startTimer();
}

function updateTopBar() {
  levelDiv.textContent = `Level: ${level}`;
  timerDiv.textContent = infiniteMode ? "∞ Infinite Mode" : `Time: ${timeLeft}s`;
  scoreDiv.textContent = `Score: ${score}`;
  targetColor = getRandomTarget();
  targetDiv.innerHTML = `Target: <b style="color:${targetColor}">${targetColor.toUpperCase()}</b>`;
}

function getRandomTarget() {
  const possible = level >= 3 ? [...baseColors, ...advancedColors] : baseColors;
  return possible[Math.floor(Math.random() * possible.length)];
}

function createGrid() {
  grid.innerHTML = '';
  const totalCells = 16;
  for (let i = 0; i < totalCells; i++) {
    const div = document.createElement('div');
    div.className = 'cell';
    div.style.backgroundColor = baseColors[Math.floor(Math.random() * baseColors.length)];
    div.addEventListener('click', () => selectCell(div));
    grid.appendChild(div);
  }
}

function selectCell(cell) {
  if (!selected) {
    selected = cell;
    cell.classList.add('selected');
  } else {
    if (areAdjacent(selected, cell)) {
      const newColor = mix(selected.style.backgroundColor, cell.style.backgroundColor);
      if (newColor) {
        animateMerge(selected, cell, newColor);
      }
    }
    selected.classList.remove('selected');
    selected = null;
  }
}

function areAdjacent(cell1, cell2) {
  const cells = Array.from(grid.children);
  const idx1 = cells.indexOf(cell1);
  const idx2 = cells.indexOf(cell2);
  const cols = 4;
  return [idx1 - 1, idx1 + 1, idx1 - cols, idx1 + cols].includes(idx2);
}

function mix(color1, color2) {
  const key = `${color1}+${color2}`;
  return mixRules[key] || null;
}

function animateMerge(cell1, cell2, newColor) {
  mergeSound.currentTime = 0;
  mergeSound.play();
  cell1.style.transform = "scale(1.3)";
  cell2.style.transform = "scale(0)";
  setTimeout(() => {
    cell1.style.backgroundColor = newColor;
    cell1.style.transform = "scale(1)";
    cell2.remove();
    score += 10;
    updateTopBar();
    checkWin();
  }, 300);
}

function startTimer() {
  clearInterval(timerInterval);
  if (!infiniteMode) {
    timerInterval = setInterval(() => {
      timeLeft--;
      timerDiv.textContent = `Time: ${timeLeft}s`;
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        setTimeout(() => {
          alert(`⏰ Time's up! Final Score: ${score}`);
          startGame(false);
        }, 100);
      }
    }, 1000);
  }
}

function checkWin() {
  const cells = Array.from(grid.children);
  for (const cell of cells) {
    if (cell.style.backgroundColor === targetColor) {
      setTimeout(() => {
        alert(`🎉 Level ${level} complete!`);
        level++;
        score += 50;
        updateTopBar();
        createGrid();
      }, 300);
    }
  }
}

</script>

<a href="/">Retour à la home</a>

</body>
</html>

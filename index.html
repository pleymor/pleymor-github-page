<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Premier Projet</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background-color: #f0f0f0;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <h1>Bienvenue sur mon site !</h1>
  <p id="message">Clique sur le bouton pour voir un message.</p>

  <button id="monBouton">Clique-moi</button>

  <script>
    const bouton = document.getElementById('monBouton');
    const message = document.getElementById('message');

    bouton.addEventListener('click', () => {
      message.textContent = 'Bravo, tu as cliqué !';
    });
  </script>

</body>
</html>
